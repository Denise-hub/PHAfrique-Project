# Build and deploy Next.js static export to GitHub Pages
# Site will be at https://<username>.github.io/PHAfrique-Project/
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAGES: '1'
      DATABASE_URL: 'file:./prisma/dev.db'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Prepare for static export
        run: |
          set -e
          mkdir -p .gh-pages-skip
          if [ -d src/app/api ]; then mv src/app/api .gh-pages-skip/; fi
          if [ -d src/app/admin ]; then mv src/app/admin .gh-pages-skip/; fi
          echo "Contents of src/app:"
          ls -la src/app

      - name: Build Next.js (static export)
        run: npm run build
        env:
          NODE_ENV: production

      - name: Verify output
        run: |
          if [ ! -d out ] || [ -z "$(ls -A out 2>/dev/null)" ]; then
            echo "ERROR: out directory missing or empty"
            exit 1
          fi
          echo "Export OK:"
          ls -la out | head -20

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
